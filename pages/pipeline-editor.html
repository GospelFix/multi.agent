<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파이프라인 편집기 — llm agent</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/pipeline-editor.css">
</head>
<body>

<!-- 모바일 햄버거 메뉴 -->
<button class="hamburger" id="hamburger-btn" aria-label="메뉴 열기">☰</button>

<!-- 사이드바 (app.js가 동적 생성) -->
<aside class="sidebar" id="sidebar" role="navigation" aria-label="주 내비게이션"></aside>

<main class="main" role="main">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">파이프라인 <span>편집기</span></h1>
      <p class="page-subtitle">에이전트 순서·구성·컨텍스트를 직접 설계하세요. 저장하면 파이프라인 실행 시 자동으로 적용됩니다.</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="reset-btn" aria-label="파이프라인 초기화">초기화</button>
      <button class="btn btn-primary" id="save-btn" aria-label="파이프라인 저장 및 적용">저장 &amp; 적용</button>
    </div>
  </div>

  <!-- 파이프라인 이름 입력 -->
  <div class="card editor-name-card">
    <div class="editor-name-row">
      <label class="editor-name-label" for="pipeline-name-input">파이프라인 이름</label>
      <input
        type="text"
        id="pipeline-name-input"
        class="brand-input editor-name-input"
        placeholder="예) 콘텐츠 마케팅 파이프라인"
        aria-label="파이프라인 이름 입력"
        maxlength="60"
      />
    </div>
  </div>

  <!-- 에이전트 스텝 목록 (pipeline-editor.js가 동적 생성) -->
  <div id="step-list" class="step-list" role="list" aria-label="파이프라인 스텝 목록">
    <div class="step-list-loading" style="text-align:center;padding:48px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;">
      로딩 중...
    </div>
  </div>

  <!-- 에이전트 추가 버튼 -->
  <div class="add-step-row">
    <button class="btn btn-ghost add-step-btn" id="add-step-btn" aria-label="에이전트 스텝 추가">
      + 에이전트 추가
    </button>
  </div>

  <!-- 에이전트 추가 모달 -->
  <div id="add-agent-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-label="에이전트 선택">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">에이전트 풀에서 선택</div>
        <button class="modal-close-btn" id="modal-close-btn" aria-label="모달 닫기">×</button>
      </div>
      <div id="agent-pool-list" class="agent-pool-list" role="list" aria-label="선택 가능한 에이전트 목록">
        <!-- pipeline-editor.js가 동적 생성 -->
      </div>
    </div>
  </div>

</main>

<!-- 의존성 순서: store → app → pipeline-editor -->
<script src="../js/store.js"></script>
<script src="../js/app.js"></script>
<script src="../js/pipeline-editor.js"></script>

</body>
</html>
